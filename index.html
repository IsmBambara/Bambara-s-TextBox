  <title>Bambara's TextBox</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@400;600;700;800&display=swap');
    :root{--clay:#c8745a;--clay-dark:#b15f47;--ink:#f0e9df;--ink-soft:#b3a596;
      --sand:#231e1a;--sand-2:#2e2823;--line:rgba(255,255,255,.09);--paper:#26211d;--green:#5bb27a;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;height:100%;width:100%;overflow:hidden;overscroll-behavior:none;}
    body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);
      background:#1b1815;touch-action:manipulation;}
    #root{height:100dvh;height:var(--app-h,100dvh);overflow:hidden;}
    .app{height:100%;}
    button{font-family:inherit;cursor:pointer;}
    input{font-family:inherit;}
    .scroll{-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

    .auth-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:20px;
      background:linear-gradient(160deg,#241f1b,#15110e);}
    .auth-card{background:var(--paper);border-radius:22px;box-shadow:0 18px 50px rgba(70,50,35,.18);padding:34px 30px;width:100%;max-width:380px;text-align:center;}
    .auth-card .logo{font-size:42px;}
    .auth-card h1{font-family:'Caveat',cursive;font-size:40px;color:var(--clay);margin:4px 0 2px;}
    .auth-card p{color:var(--ink-soft);font-size:14px;margin:0 0 22px;}
    .field{display:block;width:100%;border:2px solid var(--sand-2);border-radius:13px;padding:13px 15px;font-size:16px;margin-bottom:12px;outline:none;}
    .field:focus{border-color:var(--clay);}
    .primary{width:100%;background:var(--clay);color:#fff;border:none;border-radius:13px;padding:14px;font-size:16px;font-weight:800;}
    .primary:hover{background:var(--clay-dark);}
    .primary:disabled{opacity:.5;}
    .switch{margin-top:16px;font-size:14px;color:var(--ink-soft);}
    .switch b{color:var(--clay);cursor:pointer;}
    .err{background:#f6dcc9;color:#8a3a22;border-radius:10px;padding:9px 12px;font-size:13.5px;margin-bottom:14px;}

    .app{display:flex;height:100%;max-width:1024px;margin:0 auto;background:var(--paper);box-shadow:0 0 60px rgba(70,50,35,.15);}
    .sidebar{width:340px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--paper);}
    .side-head{padding:calc(13px + env(safe-area-inset-top)) 14px 13px;display:flex;align-items:center;gap:10px;background:var(--clay);color:#fff;}
    .side-id{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0;}
    .side-head .me{font-weight:800;font-size:15px;line-height:1.15;min-width:0;}
    .side-head .me small{font-weight:600;opacity:.85;font-size:12px;}
    .icon-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;flex-shrink:0;}
    .icon-btn:hover{background:rgba(255,255,255,.3);}
    .head-actions{margin-left:auto;display:flex;gap:7px;}
    .searchbar{padding:9px 12px;border-bottom:1px solid var(--line);background:var(--sand);}
    .searchbar input{width:100%;border:none;border-radius:20px;padding:9px 15px;font-size:14.5px;background:var(--paper);outline:none;box-shadow:inset 0 1px 3px rgba(0,0,0,.05);}
    .new-row{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);}
    .new-row button{flex:1;background:var(--sand);border:1px solid var(--line);border-radius:11px;padding:9px;font-weight:700;font-size:13.5px;color:var(--ink);}
    .new-row button:hover{border-color:var(--clay);color:var(--clay);}
    .conv-list{flex:1;overflow-y:auto;}
    .conv{display:flex;gap:12px;align-items:center;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line);}
    .conv:hover{background:var(--sand);}
    .conv.active{background:var(--sand-2);}
    .conv .meta{min-width:0;flex:1;}
    .conv .name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv .last{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv .tag{font-size:10px;background:rgba(79,157,106,.18);color:var(--green);font-weight:800;padding:1px 7px;border-radius:10px;margin-left:6px;}
    .unread{width:11px;height:11px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .empty-side{padding:30px 20px;text-align:center;color:var(--ink-soft);font-size:14px;}

    .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;overflow:hidden;object-fit:cover;}

    .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background-color:#1b1815;background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNTAiIGhlaWdodD0iMTUwIiB2aWV3Qm94PSIwIDAgMTUwIDE1MCI+PGcgZmlsbD0iI2U5ZGRjOSIgZmlsbC1vcGFjaXR5PSIwLjA3Ij48cGF0aCB0cmFuc2Zvcm09InRyYW5zbGF0ZSgxOCwyMikgc2NhbGUoMC45KSIgZD0iTTEyIDIxLjM1bC0xLjQ1LTEuMzJDNS40IDE1LjM2IDIgMTIuMjggMiA4LjUgMiA1LjQyIDQuNDIgMyA3LjUgM2MxLjc0IDAgMy40MS44MSA0LjUgMi4wOUMxMy4wOSAzLjgxIDE0Ljc2IDMgMTYuNSAzIDE5LjU4IDMgMjIgNS40MiAyMiA4LjVjMCAzLjc4LTMuNCA2Ljg2LTguNTUgMTEuNTRMMTIgMjEuMzV6Ii8+PHBhdGggdHJhbnNmb3JtPSJ0cmFuc2xhdGUoOTUsOTgpIHNjYWxlKDAuNykiIGQ9Ik0xMiAyMS4zNWwtMS40NS0xLjMyQzUuNCAxNS4zNiAyIDEyLjI4IDIgOC41IDIgNS40MiA0LjQyIDMgNy41IDNjMS43NCAwIDMuNDEuODEgNC41IDIuMDlDMTMuMDkgMy44MSAxNC43NiAzIDE2LjUgMyAxOS41OCAzIDIyIDUuNDIgMjIgOC41YzAgMy43OC0zLjQgNi44Ni04LjU1IDExLjU0TDEyIDIxLjM1eiIvPjxjaXJjbGUgY3g9IjcwIiBjeT0iNjQiIHI9IjMiLz48Y2lyY2xlIGN4PSIxMjQiIGN5PSI0MCIgcj0iMi40Ii8+PGNpcmNsZSBjeD0iMzYiIGN5PSIxMjAiIHI9IjIuNCIvPjwvZz48ZyBmaWxsPSJub25lIiBzdHJva2U9IiNlOWRkYzkiIHN0cm9rZS1vcGFjaXR5PSIwLjA4IiBzdHJva2Utd2lkdGg9IjIiPjxjaXJjbGUgY3g9IjExMiIgY3k9IjQwIiByPSIxMyIvPjxjaXJjbGUgY3g9IjQ2IiBjeT0iMTEyIiByPSI4Ii8+PC9nPjwvc3ZnPgo=");background-size:150px 150px;}
    .main-head{display:flex;align-items:center;gap:11px;padding:calc(11px + env(safe-area-inset-top)) 14px 11px;border-bottom:1px solid var(--line);background:var(--clay);color:#fff;}
    .main-head .hid{display:flex;align-items:center;gap:11px;cursor:pointer;min-width:0;flex:1;}
    .main-head .title{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .main-head .subtitle{font-size:12px;opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .call-btns{display:flex;gap:7px;}
    .call-btns button{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:50%;width:40px;height:40px;font-size:16px;}
    .call-btns button:hover{background:rgba(255,255,255,.3);}
    .back-btn{display:none;background:none;border:none;font-size:24px;color:#fff;padding:0 2px 0 0;}
    .messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:3px;
      background-color:#1b1815;
      background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNTAiIGhlaWdodD0iMTUwIiB2aWV3Qm94PSIwIDAgMTUwIDE1MCI+PGcgZmlsbD0iI2U5ZGRjOSIgZmlsbC1vcGFjaXR5PSIwLjA3Ij48cGF0aCB0cmFuc2Zvcm09InRyYW5zbGF0ZSgxOCwyMikgc2NhbGUoMC45KSIgZD0iTTEyIDIxLjM1bC0xLjQ1LTEuMzJDNS40IDE1LjM2IDIgMTIuMjggMiA4LjUgMiA1LjQyIDQuNDIgMyA3LjUgM2MxLjc0IDAgMy40MS44MSA0LjUgMi4wOUMxMy4wOSAzLjgxIDE0Ljc2IDMgMTYuNSAzIDE5LjU4IDMgMjIgNS40MiAyMiA4LjVjMCAzLjc4LTMuNCA2Ljg2LTguNTUgMTEuNTRMMTIgMjEuMzV6Ii8+PHBhdGggdHJhbnNmb3JtPSJ0cmFuc2xhdGUoOTUsOTgpIHNjYWxlKDAuNykiIGQ9Ik0xMiAyMS4zNWwtMS40NS0xLjMyQzUuNCAxNS4zNiAyIDEyLjI4IDIgOC41IDIgNS40MiA0LjQyIDMgNy41IDNjMS43NCAwIDMuNDEuODEgNC41IDIuMDlDMTMuMDkgMy44MSAxNC43NiAzIDE2LjUgMyAxOS41OCAzIDIyIDUuNDIgMjIgOC41YzAgMy43OC0zLjQgNi44Ni04LjU1IDExLjU0TDEyIDIxLjM1eiIvPjxjaXJjbGUgY3g9IjcwIiBjeT0iNjQiIHI9IjMiLz48Y2lyY2xlIGN4PSIxMjQiIGN5PSI0MCIgcj0iMi40Ii8+PGNpcmNsZSBjeD0iMzYiIGN5PSIxMjAiIHI9IjIuNCIvPjwvZz48ZyBmaWxsPSJub25lIiBzdHJva2U9IiNlOWRkYzkiIHN0cm9rZS1vcGFjaXR5PSIwLjA4IiBzdHJva2Utd2lkdGg9IjIiPjxjaXJjbGUgY3g9IjExMiIgY3k9IjQwIiByPSIxMyIvPjxjaXJjbGUgY3g9IjQ2IiBjeT0iMTEyIiByPSI4Ii8+PC9nPjwvc3ZnPgo=");background-size:150px 150px;}
    .messages .placeholder{color:#cdbfa8;}
    .daysep{align-self:center;background:rgba(0,0,0,.4);color:#e9ddc9;font-size:11.5px;font-weight:800;padding:4px 14px;border-radius:14px;margin:10px 0 6px;}
    .row{display:flex;gap:8px;align-items:flex-end;max-width:80%;margin-top:2px;}
    .row.mine{align-self:flex-end;flex-direction:row-reverse;}
    .row.theirs{align-self:flex-start;}
    .row .avatar{cursor:pointer;}
    .bubble{padding:8px 12px 6px;border-radius:14px;font-size:15.5px;line-height:1.4;box-shadow:0 1px 2px rgba(70,50,35,.16);word-break:break-word;position:relative;}
    .bubble.theirs{background:#2b2521;color:var(--ink);border-top-left-radius:4px;}
    .bubble.mine{background:var(--clay);color:#fff;border-top-right-radius:4px;}
    .bubble.mine .meta-line{color:rgba(255,255,255,.85);}
    .bubble.media{padding:4px 4px 4px;}
    .sender{font-size:12px;font-weight:800;margin-bottom:2px;}
    .msg-img{max-width:230px;max-height:300px;border-radius:11px;display:block;cursor:pointer;}
    .msg-audio{width:230px;height:40px;display:block;}
    .meta-line{display:flex;align-items:center;justify-content:flex-end;gap:4px;font-size:10px;color:var(--ink-soft);margin-top:2px;}
    .tick{font-weight:800;}
    .tick.read{color:#2f9bd1;}
    .composer{display:grid;grid-template-columns:auto auto auto minmax(0,1fr) auto;gap:8px;align-items:center;padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--sand);}
    .composer.rec{display:flex;}
    .composer input.txt{min-width:0;width:100%;border:none;border-radius:22px;padding:12px 16px;font-size:16px;background:var(--paper);color:var(--ink);outline:none;box-shadow:inset 0 1px 3px rgba(0,0,0,.06);}
    .attach{background:var(--paper);border:1px solid var(--line);border-radius:50%;width:42px;height:42px;font-size:18px;flex-shrink:0;}
    .attach:hover{border-color:var(--clay);}
    .attach:disabled{opacity:.4;}
    .send{background:var(--clay);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:18px;flex-shrink:0;}
    .send:hover{background:var(--clay-dark);}
    .send:disabled{opacity:.4;}
    .send.stop{background:#c0392b;}
    .recording{flex:1;display:flex;align-items:center;gap:9px;color:#c0392b;font-weight:700;font-size:15px;padding-left:6px;}
    .dot{width:11px;height:11px;border-radius:50%;background:#c0392b;animation:blink 1s infinite;}
    @keyframes blink{50%{opacity:.25;}}
    .placeholder{margin:auto;text-align:center;color:var(--ink-soft);padding:30px;}
    .placeholder .big{font-size:46px;margin-bottom:8px;}

    .emoji-panel{position:absolute;bottom:72px;left:12px;right:12px;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 30px rgba(60,40,25,.25);padding:8px;max-height:210px;overflow-y:auto;display:grid;grid-template-columns:repeat(8,1fr);gap:2px;z-index:20;}
    .emoji-panel button{background:none;border:none;font-size:23px;padding:5px;border-radius:8px;line-height:1;}
    .emoji-panel button:hover{background:var(--sand);}

    .overlay{position:fixed;inset:0;background:rgba(46,41,38,.5);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;}
    .modal{background:var(--paper);border-radius:18px;width:100%;max-width:390px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.3);max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;}
    .modal h2{margin:0 0 14px;font-size:19px;}
    .modal h3{margin:8px 0 8px;font-size:12.5px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
    .user-pick{overflow-y:auto;margin-bottom:14px;}
    .user-row{display:flex;gap:11px;align-items:center;padding:9px 8px;border-radius:11px;cursor:pointer;}
    .user-row:hover{background:var(--sand);}
    .user-row .nm{font-weight:700;font-size:15px;}
    .user-row .em{font-size:12px;color:var(--ink-soft);}
    .check{margin-left:auto;font-size:18px;color:var(--clay);width:22px;text-align:center;}
    .modal-actions{display:flex;gap:10px;}
    .modal-actions button{flex:1;border-radius:12px;padding:12px;font-weight:800;border:none;font-size:15px;}
    .ghost{background:var(--sand-2);color:var(--ink);}
    .swatch-row{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px;}
    .swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;}
    .swatch.sel{border-color:var(--ink);}
    .photo-block{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
    .link-btn{background:var(--sand-2);border:none;border-radius:11px;padding:10px 14px;font-weight:700;color:var(--ink);}
    .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
    .chip{background:var(--sand-2);border:1px solid var(--line);border-radius:16px;padding:7px 13px;font-size:13.5px;font-weight:700;color:var(--ink);}
    .chip:hover{border-color:var(--clay);color:var(--clay);}
    .notif-row{display:flex;align-items:center;gap:10px;background:var(--sand);border-radius:12px;padding:11px 13px;margin-bottom:16px;font-size:14px;}

    .prof{display:flex;flex-direction:column;align-items:center;text-align:center;}
    .prof .big-av{cursor:zoom-in;margin-bottom:14px;}
    .prof .pname{font-size:22px;font-weight:800;}
    .prof .pmail{font-size:13px;color:var(--ink-soft);margin-top:2px;}
    .prof .pabout{margin-top:8px;background:var(--sand);border-radius:12px;padding:12px 14px;font-size:15px;width:100%;}
    .prof .palabel{font-size:11px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.04em;text-align:left;margin-top:14px;width:100%;}

    .callmsg{align-self:center;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.4);color:#e9ddc9;font-size:13px;font-weight:700;padding:7px 14px;border-radius:14px;margin:6px 0;}
    .callmsg .t{opacity:.55;font-size:10px;}
    .sheet{background:var(--paper);border-radius:16px;width:100%;max-width:320px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.45);}
    .sheet button{display:block;width:100%;text-align:left;padding:15px 18px;background:none;border:none;border-bottom:1px solid var(--line);font-size:16px;color:var(--ink);font-weight:700;}
    .sheet button:last-child{border-bottom:none;}
    .sheet button:hover{background:var(--sand);}
    .sheet button.danger{color:#e0664f;}
    .editbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--sand-2);border-top:1px solid var(--line);font-size:13.5px;color:var(--ink-soft);font-weight:700;}
    .editbar button{margin-left:auto;background:none;border:none;color:var(--clay);font-size:18px;}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px;}
    .lightbox img{max-width:94vw;max-height:88vh;border-radius:14px;}
    .lightbox .close{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;background:none;border:none;}

    .incoming{position:fixed;top:0;left:0;right:0;background:var(--clay);color:#fff;z-index:80;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;gap:13px;box-shadow:0 6px 24px rgba(0,0,0,.3);animation:slidein .25s ease;}
    @keyframes slidein{from{transform:translateY(-100%);}to{transform:none;}}
    .incoming .who{flex:1;min-width:0;}
    .incoming .who b{font-size:16px;}
    .incoming .who div{font-size:12.5px;opacity:.9;}
    .incoming .ans{background:#3a9d63;border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:20px;}
    .incoming .dec{background:#c0392b;border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:20px;}

    .call-screen{position:fixed;inset:0;background:#1d1916;color:#fff;z-index:85;display:flex;flex-direction:column;align-items:center;}
    .call-video-remote{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
    .call-video-local{position:absolute;top:16px;right:16px;width:108px;height:150px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,255,255,.5);background:#000;z-index:2;}
    .call-info{position:relative;z-index:2;margin-top:14vh;display:flex;flex-direction:column;align-items:center;text-shadow:0 1px 6px rgba(0,0,0,.5);}
    .call-info .cname{font-size:26px;font-weight:800;margin-top:14px;}
    .call-info .cstate{opacity:.85;margin-top:5px;font-size:15px;}
    .call-controls{position:relative;z-index:3;margin-top:auto;margin-bottom:8vh;display:flex;gap:18px;}
    .call-controls button{width:62px;height:62px;border-radius:50%;border:none;font-size:24px;color:#fff;background:rgba(255,255,255,.18);}
    .call-controls .hang{background:#c0392b;}
    .call-controls .on{background:#fff;color:var(--ink);}

    @media (max-width:760px){
      .app{max-width:none;}
      .sidebar{width:100%;}
      .app.has-active .sidebar{display:none;}
      .app:not(.has-active) .main{display:none;}
      .back-btn{display:block;}
    }
  </style>
</head>

    function colorFor(s){let h=0;s=s||"?";for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return THEME_COLORS[h%THEME_COLORS.length];}
    function initials(n){if(!n)return"?";const p=n.trim().split(/\s+/);return(p.length===1?p[0][0]:p[0][0]+p[p.length-1][0]).toUpperCase();}
    function fmtTime(ts){if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}
    function fmtDay(ts){if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);const t=new Date();const y=new Date();y.setDate(t.getDate()-1);
      if(d.toDateString()===t.toDateString())return"Aujourd'hui";if(d.toDateString()===y.toDateString())return"Hier";
      return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}

    function directId(a,b){return[a,b].sort().join("__");}
    function darken(hex,amt){amt=amt||0.16;const h=(hex||"").replace("#","");if(h.length!==6)return hex;
      let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
      r=Math.round(r*(1-amt));g=Math.round(g*(1-amt));b=Math.round(b*(1-amt));
      return "#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join("");}
    function readAsDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}
    async function compressImage(file,maxDim){
      maxDim=maxDim||1024;const src=await readAsDataURL(file);
      const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});
      let w=img.width,h=img.height;
      if(w>h && w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>=w && h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      let q=0.8,out=c.toDataURL("image/jpeg",q);
      while(out.length>900000 && q>0.3){q-=0.12;out=c.toDataURL("image/jpeg",q);}
      return out;

    function notify(title,body){
      if(!("Notification" in window) || Notification.permission!=="granted")return;
      try{
        if(navigator.serviceWorker && navigator.serviceWorker.ready){
          navigator.serviceWorker.ready.then(r=>r.showNotification(title,{body,icon:"icon-192.png",badge:"icon-192.png",tag:title})).catch(()=>{
            try{new Notification(title,{body,icon:"icon-192.png"});}catch(e){}
          });
        }else{new Notification(title,{body,icon:"icon-192.png"});}
      }catch(e){}
    }

    function isOnline(u){return !!(u && u.lastActive && (Date.now()-ms(u.lastActive)<90000));}

      try{await emailjs.send(EMAILJS.serviceId,EMAILJS.templateId,{to_email:toEmail,to_name:toName||"",from_name:fromName||"",message:message||""});}catch(e){}

    function Avatar({name,photo,size=42,onClick}){
      const style={width:size,height:size};
      if(photo) return <img className="avatar" src={photo} style={style} onClick={onClick} alt=""/>;
      return <div className="avatar" style={{...style,fontSize:size*0.38,background:colorFor(name)}} onClick={onClick}>{initials(name)}</div>;
    }

    function AuthScreen(){

      async function submit(e){
        e.preventDefault();setErr("");setBusy(true);
        try{
          if(mode==="register"){
            if(name.trim().length<2){setErr("Indique ton prenom.");setBusy(false);return;}
            const cred=await auth.createUserWithEmailAndPassword(email.trim(),pw);
            await cred.user.updateProfile({displayName:name.trim()});
            await db.collection("users").doc(cred.user.uid).set({uid:cred.user.uid,email:email.trim(),displayName:name.trim(),about:"",createdAt:TS()});
          }else{ await auth.signInWithEmailAndPassword(email.trim(),pw); }
        }catch(ex){

            "auth/weak-password":"Mot de passe trop court (6 caracteres minimum).","auth/invalid-credential":"E-mail ou mot de passe incorrect.",
            "auth/wrong-password":"Mot de passe incorrect.","auth/user-not-found":"Aucun compte avec cette adresse."}[ex.code]||ex.message;
          setErr(m);
        }
        setBusy(false);
      }
      return (
        <div className="auth-wrap"><div className="auth-card">
          <div className="logo">🏡</div><h1>{APP_NAME}</h1>
          <p>{mode==="register"?"Cree ton compte pour rejoindre la famille.":"Connecte-toi pour retrouver tes conversations."}</p>
          {err && <div className="err">{err}</div>}

            {mode==="register" && <input className="field" placeholder="Ton prenom" value={name} onChange={e=>setName(e.target.value)} />}
            <input className="field" type="email" placeholder="Adresse e-mail" value={email} onChange={e=>setEmail(e.target.value)} />
            <input className="field" type="password" placeholder="Mot de passe" value={pw} onChange={e=>setPw(e.target.value)} />

    function ChatApp({user}){

      const [showEmoji,setShowEmoji]=useState(false);
      const [uploading,setUploading]=useState(false);
      const [recording,setRecording]=useState(false);
      const [recSec,setRecSec]=useState(0);
      const [incoming,setIncoming]=useState(null);
      const [call,setCall]=useState(null);
      const [localStream,setLocalStream]=useState(null);
      const [remoteStream,setRemoteStream]=useState(null);
      const [muted,setMuted]=useState(false);
      const [camOff,setCamOff]=useState(false);
      const [msgMenu,setMsgMenu]=useState(null);
      const [editing,setEditing]=useState(null);

      const scroller=useRef(null),fileRef=useRef(null),recRef=useRef(null),chunksRef=useRef([]);
      const pcRef=useRef(null),callRefRef=useRef(null),callUnsubs=useRef([]),callInfoRef=useRef(null);
      const usersRef=useRef([]),activeIdRef=useRef(null),notifSeen=useRef({}),notifInit=useRef(false);
      const ringRef=useRef(null),pressTimer=useRef(null),lastEmailed=useRef({});
      usersRef.current=users; activeIdRef.current=activeId;

      useEffect(()=>db.collection("users").onSnapshot(s=>setUsers(s.docs.map(d=>d.data()))),[]);
      useEffect(()=>{
        const beat=()=>db.collection("users").doc(user.uid).set({lastActive:TS()},{merge:true}).catch(()=>{});
        beat();const id=setInterval(beat,50000);
        const onVis=()=>{if(!document.hidden)beat();};document.addEventListener("visibilitychange",onVis);
        return ()=>{clearInterval(id);document.removeEventListener("visibilitychange",onVis);};
      },[user.uid]);

      useEffect(()=>db.collection("conversations").where("members","array-contains",user.uid).onSnapshot(s=>{
        const list=s.docs.map(d=>({id:d.id,...d.data()}));
        list.sort((a,b)=>(ms(b.lastMessageAt)||ms(b.createdAt))-(ms(a.lastMessageAt)||ms(a.createdAt)));
        // notifications (appli ouverte / arriere-plan)
        list.forEach(c=>{
          const last=ms(c.lastMessageAt),prev=notifSeen.current[c.id];
          if(notifInit.current && prev!==undefined && last>prev && c.lastSenderId && c.lastSenderId!==user.uid){
            if(document.hidden || activeIdRef.current!==c.id){
              const who=c.type==="group"?c.name:((c.memberNames&&c.memberNames[c.lastSenderId])||"Nouveau message");
              notify(who, c.lastMessage||"Nouveau message");
            }
          }
          notifSeen.current[c.id]=last;
        });
        notifInit.current=true;
        setConvs(list);
      }),[user.uid]);

      useEffect(()=>{
        if(!activeId){setMessages([]);return;}
        return db.collection("conversations").doc(activeId).collection("messages").orderBy("createdAt","asc").onSnapshot(s=>{
          const list=s.docs.map(d=>({id:d.id,...d.data()}));setMessages(list);
          if(list.length) db.collection("conversations").doc(activeId).update({["reads."+user.uid]:TS()}).catch(()=>{});
        });
      },[activeId]);
      useEffect(()=>{if(scroller.current)scroller.current.scrollTop=scroller.current.scrollHeight;},[messages]);
      useEffect(()=>{if(!recording){setRecSec(0);return;}const id=setInterval(()=>setRecSec(s=>s+1),1000);return ()=>clearInterval(id);},[recording]);
      useEffect(()=>{if(!call||call.state!=="active")return;const id=setInterval(()=>setCall(c=>c?{...c,seconds:(c.seconds||0)+1}:c),1000);return ()=>clearInterval(id);},[call&&call.state]);

      useEffect(()=>{
        return db.collection("calls").where("calleeId","==",user.uid).onSnapshot(s=>{
          s.docChanges().forEach(ch=>{
            const d=ch.doc.data();const recent=Date.now()-(ms(d.createdAt)||Date.now())<60000;
            if(ch.type==="added"||ch.type==="modified"){
              if(d.status==="ringing" && recent && !pcRef.current){
                const u=usersRef.current.find(x=>x.uid===d.callerId)||{};
                setIncoming({id:ch.doc.id,callerId:d.callerId,callerName:d.callerName,type:d.type,photoURL:u.photoURL});
                if(document.hidden) notify(d.callerName,(d.type==="video"?"Appel vidéo entrant":"Appel entrant"));
              }else{setIncoming(inc=>inc&&inc.id===ch.doc.id?null:inc);}
            }
            if(ch.type==="removed")setIncoming(inc=>inc&&inc.id===ch.doc.id?null:inc);
          });
        });
      },[user.uid]);

      useEffect(()=>{
        const playing=incoming && !call;
        let vib;
        if(playing){
          if(!ringRef.current){ringRef.current=new Audio(RINGTONE);ringRef.current.loop=true;}
          ringRef.current.play().catch(()=>{});
          if(navigator.vibrate){navigator.vibrate([500,300,500,300]);vib=setInterval(()=>{try{navigator.vibrate([500,300,500,300]);}catch(e){}},1800);}
        }else{
          if(ringRef.current){try{ringRef.current.pause();ringRef.current.currentTime=0;}catch(e){}}
          if(navigator.vibrate)try{navigator.vibrate(0);}catch(e){}
        }
        return ()=>{if(vib)clearInterval(vib);};
      },[incoming,call]);

      const userMap={}; users.forEach(u=>{userMap[u.uid]=u;});
      const myProfile={uid:user.uid,displayName:user.displayName,email:user.email,...(userMap[user.uid]||{})};
      const myName=myProfile.displayName||user.displayName||user.email;

        document.documentElement.style.setProperty("--clay",c);

      const active=convs.find(c=>c.id===activeId);

      function convTitle(c){if(!c)return"";if(c.type==="group")return c.name;const o=c.members.find(u=>u!==user.uid);return (c.memberNames&&c.memberNames[o])||"Conversation";}
      function convPhoto(c){if(c.type==="group")return null;const o=c.members.find(u=>u!==user.uid);return userMap[o]&&userMap[o].photoURL;}
      function convSubtitle(c){if(c.type==="group")return c.members.length+" membres";const o=c.members.find(u=>u!==user.uid);const ou=userMap[o];if(ou&&isOnline(ou))return "en ligne";return (ou&&ou.about)||"Conversation privée";}
      function isRead(m){if(!active||!active.reads)return false;const others=active.members.filter(u=>u!==user.uid);if(others.length===0)return false;return others.every(u=>active.reads[u]&&ms(active.reads[u])>=ms(m.createdAt));}
      function unread(c){if(!c.lastSenderId||c.lastSenderId===user.uid||!c.lastMessage)return false;const r=c.reads&&c.reads[user.uid];return ms(c.lastMessageAt)>ms(r||0);}

      async function openDirect(otherUid){
        const id=directId(user.uid,otherUid);const other=userMap[otherUid];
        const ref=db.collection("conversations").doc(id);
        let exists=false;try{const snap=await ref.get();exists=snap.exists;}catch(e){exists=false;}
        if(!exists){try{await ref.set({type:"direct",members:[user.uid,otherUid],
            memberNames:{[user.uid]:myName,[otherUid]:(other&&other.displayName)||"?"},
            createdBy:user.uid,createdAt:TS(),lastMessageAt:TS(),lastMessage:"",lastSenderId:""});}
          catch(e){alert("Impossible d'ouvrir la conversation : "+e.message);return;}}
        setModal(null);setViewUid(null);setActiveId(id);

      async function createGroup(memberUids,name){
        const mem=[user.uid,...memberUids];const memberNames={[user.uid]:myName};

        const ref=await db.collection("conversations").add({type:"group",name,members:mem,memberNames,createdBy:user.uid,createdAt:TS(),lastMessageAt:TS(),lastMessage:"",lastSenderId:""});
        setModal(null);setActiveId(ref.id);

        await db.collection("conversations").doc(activeId).update({lastMessage:preview,lastMessageAt:TS(),lastSenderId:user.uid});
        if(active){active.members.filter(u=>u!==user.uid).forEach(uid=>{const u=userMap[uid];if(u&&u.email&&!isOnline(u)&&canEmail(uid)){emailNotify(u.email,u.displayName,myName,(active.type==="group"?("["+active.name+"] "):"")+preview);}});}

        try{const url=await compressImage(f,1024);await pushMessage({type:"image",url},"📷 Photo");}catch(err){alert("Echec de l'envoi de l'image.");}setUploading(false);}
      async function toggleRec(){
        if(recording){recRef.current&&recRef.current.stop();return;}
        if(!window.MediaRecorder){alert("Ton navigateur ne gere pas l'enregistrement vocal.");return;}
        try{
          const stream=await navigator.mediaDevices.getUserMedia({audio:true});
          const types=["audio/webm","audio/mp4","audio/ogg"];const mime=types.find(t=>MediaRecorder.isTypeSupported(t))||"";
          const rec=new MediaRecorder(stream,mime?{mimeType:mime,audioBitsPerSecond:24000}:{audioBitsPerSecond:24000});
          chunksRef.current=[];rec.ondataavailable=e=>{if(e.data&&e.data.size)chunksRef.current.push(e.data);};

      async function logCall(peerUid,callType,status,seconds){
        const convId=directId(user.uid,peerUid);const ref=db.collection("conversations").doc(convId);
        try{const snap=await ref.get();if(!snap.exists){const o=userMap[peerUid]||{};await ref.set({type:"direct",members:[user.uid,peerUid],memberNames:{[user.uid]:myName,[peerUid]:o.displayName||"?"},createdBy:user.uid,createdAt:TS(),lastMessageAt:TS(),lastMessage:"",lastSenderId:""});}}catch(e){try{const o=userMap[peerUid]||{};await ref.set({type:"direct",members:[user.uid,peerUid],memberNames:{[user.uid]:myName,[peerUid]:o.displayName||"?"},createdBy:user.uid,createdAt:TS(),lastMessageAt:TS(),lastMessage:"",lastSenderId:""});}catch(e2){return;}}
        const prev=(callType==="video"?"🎥 ":"📞 ")+(status==="missed"?"Appel manqué":status==="declined"?"Appel refusé":"Appel");
        await ref.collection("messages").add({type:"call",callType,callerId:user.uid,status,duration:seconds||0,senderId:user.uid,senderName:myName,createdAt:TS()}).catch(()=>{});
        await ref.update({lastMessage:prev,lastMessageAt:TS(),lastSenderId:user.uid}).catch(()=>{});
      }
      function endCall(reason){
        if(!callRefRef.current && !callInfoRef.current){setCall(null);return;}
        const info=callInfoRef.current;const ref=callRefRef.current;
        callRefRef.current=null;callInfoRef.current=null;
        if(ref){ref.update({status:"ended"}).catch(()=>{});setTimeout(()=>ref.delete().catch(()=>{}),1500);}
        if(info && info.dir==="out"){const seconds=info.connected&&info.startAt?Math.round((Date.now()-info.startAt)/1000):0;const status=reason==="declined"?"declined":(info.connected?"completed":"missed");logCall(info.peerUid,info.type,status,seconds);}
        cleanupCall();setCall(null);
      }
      function newPC(callRef,localCol,remoteCol){
        const pc=new RTCPeerConnection(ICE);pcRef.current=pc;
        const remote=new MediaStream();setRemoteStream(remote);
        pc.ontrack=e=>{e.streams[0].getTracks().forEach(t=>{if(!remote.getTracks().includes(t))remote.addTrack(t);});setRemoteStream(remote);};
        pc.onicecandidate=e=>{if(e.candidate)callRef.collection(localCol).add(e.candidate.toJSON()).catch(()=>{});};
        pc.onconnectionstatechange=()=>{const st=pc.connectionState;
          if(st==="connected"){if(callInfoRef.current){callInfoRef.current.connected=true;if(!callInfoRef.current.startAt)callInfoRef.current.startAt=Date.now();}setCall(c=>c?{...c,state:"active"}:c);}
          if(st==="failed"){alert("Connexion de l'appel impossible (réseau trop restrictif).");endCall();}};
        const unsub=callRef.collection(remoteCol).onSnapshot(s=>{s.docChanges().forEach(ch=>{if(ch.type==="added"){try{pc.addIceCandidate(new RTCIceCandidate(ch.doc.data()));}catch(e){}}});});
        callUnsubs.current.push(unsub);return pc;
      }
      async function startCall(peerUid,type){
        if(pcRef.current)return;
        const peer=userMap[peerUid]||{displayName:"?"};
        let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true,video:type==="video"});}
        catch(e){alert("Micro/caméra inaccessible. Autorise l'accès dans le navigateur.");return;}
        setLocalStream(stream);
        const callRef=db.collection("calls").doc();callRefRef.current=callRef;
        callInfoRef.current={dir:"out",peerUid,type,connected:false,startAt:null};
        try{await callRef.set({callerId:user.uid,callerName:myName,calleeId:peerUid,calleeName:peer.displayName,type,status:"ringing",createdAt:TS()});}
        catch(e){alert("Appel impossible. As-tu re-publié les règles Firestore ?\n\n"+e.message);stream.getTracks().forEach(t=>t.stop());setLocalStream(null);callRefRef.current=null;return;}
        const pc=newPC(callRef,"callerCandidates","calleeCandidates");
        stream.getTracks().forEach(t=>pc.addTrack(t,stream));
        const offer=await pc.createOffer();await pc.setLocalDescription(offer);
        await callRef.update({offer:{type:offer.type,sdp:offer.sdp}});
        setCall({id:callRef.id,peer:{uid:peerUid,name:peer.displayName,photoURL:peer.photoURL},dir:"out",type,state:"ringing",seconds:0});
        if(peer&&peer.email&&!isOnline(peer)&&canEmail(peerUid)){emailNotify(peer.email,peer.displayName,myName,(type==="video"?"Appel vidéo":"Appel")+" entrant sur Bambara's TextBox. Ouvre l'appli pour répondre.");}
        const unsub=callRef.onSnapshot(snap=>{const d=snap.data();if(!d)return;
          if(d.answer && pcRef.current && !pcRef.current.currentRemoteDescription){
            pcRef.current.setRemoteDescription(new RTCSessionDescription(d.answer)).catch(()=>{});
            setCall(c=>c&&c.state==="ringing"?{...c,state:"connecting"}:c);}
          if(d.status==="declined"){endCall("declined");}
          if(d.status==="ended"){endCall();}});
        callUnsubs.current.push(unsub);setViewUid(null);
      }
      async function acceptCall(inc){
        let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true,video:inc.type==="video"});}
        catch(e){alert("Micro/caméra inaccessible.");declineCall(inc);return;}
        setLocalStream(stream);setIncoming(null);
        const callRef=db.collection("calls").doc(inc.id);callRefRef.current=callRef;
        callInfoRef.current={dir:"in",peerUid:inc.callerId,type:inc.type,connected:false,startAt:null};
        const pc=newPC(callRef,"calleeCandidates","callerCandidates");
        stream.getTracks().forEach(t=>pc.addTrack(t,stream));
        let d;try{const snap=await callRef.get();d=snap.data();}catch(e){d=null;}
        if(!d||!d.offer){cleanupCall();callRefRef.current=null;return;}
        await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
        const answer=await pc.createAnswer();await pc.setLocalDescription(answer);
        await callRef.update({answer:{type:answer.type,sdp:answer.sdp},status:"accepted"});
        const peer=userMap[inc.callerId]||{};
        setCall({id:inc.id,peer:{uid:inc.callerId,name:inc.callerName,photoURL:peer.photoURL},dir:"in",type:inc.type,state:"connecting",seconds:0});
        const unsub=callRef.onSnapshot(s=>{const dd=s.data();if(dd&&dd.status==="ended")endCall();});
        callUnsubs.current.push(unsub);
      }
      function declineCall(inc){db.collection("calls").doc(inc.id).update({status:"declined"}).catch(()=>{});setIncoming(null);}
      function toggleMute(){if(!localStream)return;const on=!muted;localStream.getAudioTracks().forEach(t=>t.enabled=!on);setMuted(on);}
      function toggleCam(){if(!localStream)return;const off=!camOff;localStream.getVideoTracks().forEach(t=>t.enabled=!off);setCamOff(off);}

      const viewPerson=viewUid?(userMap[viewUid]||{uid:viewUid,displayName:"?"}):null;
      const filtered=convs.filter(c=>convTitle(c).toLowerCase().includes(search.toLowerCase()));

      // rendu des messages avec separateurs de jour
      const rows=[];let lastDay=null;
      messages.forEach(m=>{
        const day=fmtDay(m.createdAt);
        if(day&&day!==lastDay){rows.push(<div key={"d"+m.id} className="daysep">{day}</div>);lastDay=day;}
        if(m.type==="call"){
          const out=m.callerId===user.uid;const ic=m.callType==="video"?"🎥":"📞";
          let lab; if(m.status==="missed")lab=out?"Appel sans réponse":"Appel manqué";
          else if(m.status==="declined")lab="Appel refusé";
          else lab=(out?"Appel émis":"Appel reçu")+(m.duration?" · "+fmtDur(m.duration):"");
          rows.push(<div key={m.id} className="callmsg">{ic} {lab} <span className="t">{fmtTime(m.createdAt)}</span></div>);return;
        }
        const mine=m.senderId===user.uid;const media=m.type==="image"||m.type==="audio";const read=mine&&isRead(m);
        const senderPhoto=userMap[m.senderId]&&userMap[m.senderId].photoURL;
        rows.push(
          <div key={m.id} className={"row "+(mine?"mine":"theirs")}>
            <Avatar name={m.senderName} photo={senderPhoto} size={30} onClick={()=>setViewUid(m.senderId)}/>
            <div className={"bubble "+(mine?"mine":"theirs")+(media?" media":"")}
              onTouchStart={()=>mine&&pressStart(m)} onTouchEnd={pressEnd} onTouchMove={pressEnd}
              onContextMenu={e=>{if(mine){e.preventDefault();openMsgMenu(m);}}}>
              {!mine && active && active.type==="group" && <div className="sender" style={{color:colorFor(m.senderName),padding:media?"3px 6px 0":0}}>{m.senderName}</div>}
              {m.type==="image" && <img className="msg-img" src={m.url} onClick={()=>setZoom(m.url)} alt="photo"/>}
              {m.type==="audio" && <audio className="msg-audio" controls src={m.url}></audio>}
              {(!m.type||m.type==="text") && <div>{m.text}</div>}
              <div className="meta-line">{m.edited && <span style={{opacity:.7}}>modifié</span>}<span>{fmtTime(m.createdAt)}</span>{mine && <span className={"tick"+(read?" read":"")}>{read?"✓✓":"✓"}</span>}</div>
            </div>
          </div>
        );
      });

      return (
        <div className={"app"+(activeId?" has-active":"")}>
          <div className="sidebar">
            <div className="side-head">
              <div className="side-id" onClick={()=>setViewUid(user.uid)} title="Mon profil">
                <Avatar name={myName} photo={myProfile.photoURL} size={40}/>
                <div className="me">{myName}<br/><small>Voir mon profil</small></div>
              </div>
              <div className="head-actions">
                <button className="icon-btn" title="Mon profil" onClick={()=>setSettings(true)}>⚙</button>
                <button className="icon-btn" title="Se deconnecter" onClick={()=>auth.signOut()}>⏻</button>
              </div>
            </div>
            <div className="searchbar"><input placeholder="🔍  Rechercher" value={search} onChange={e=>setSearch(e.target.value)}/></div>
            <div className="new-row">
              <button onClick={()=>setModal("direct")}>＋ Message</button>
              <button onClick={()=>setModal("group")}>👥 Groupe</button>
            </div>
            <div className="conv-list scroll">
              {filtered.length===0 && <div className="empty-side">Aucune conversation. Commence par "＋ Message".</div>}
              {filtered.map(c=>(
                <div key={c.id} className={"conv"+(c.id===activeId?" active":"")} onClick={()=>setActiveId(c.id)}>
                  <Avatar name={c.type==="group"?c.name:convTitle(c)} photo={convPhoto(c)} size={48}/>
                  <div className="meta"><div className="name">{convTitle(c)}{c.type==="group"&&<span className="tag">GROUPE</span>}</div>
                    <div className="last">{c.lastMessage||"Nouvelle conversation"}</div></div>
                  {unread(c) && <div className="unread"></div>}
                </div>
              ))}
            </div>
          </div>

          <div className="main">
            {active ? (
              <>
                <div className="main-head">
                  <button className="back-btn" onClick={()=>setActiveId(null)}>‹</button>
                  <div className="hid" onClick={()=>active.type==="group"?setMembers(true):setViewUid(otherUid)}>
                    <Avatar name={active.type==="group"?active.name:convTitle(active)} photo={convPhoto(active)} size={40}/>
                    <div style={{minWidth:0}}><div className="title">{convTitle(active)}</div><div className="subtitle">{convSubtitle(active)}</div></div>
                  </div>
                  {active.type==="direct" &&
                    <div className="call-btns">
                      <button onClick={()=>startCall(otherUid,"audio")} title="Appel audio">📞</button>
                      <button onClick={()=>startCall(otherUid,"video")} title="Appel vidéo">🎥</button>
                    </div>}
                </div>
                <div className="messages scroll" ref={scroller} onClick={()=>{if(editing){setEditing(null);setDraft("");}}}>
                  {messages.length===0 && <div className="placeholder"><div className="big">💬</div>Ecris le premier message.</div>}
                  {rows}
                </div>
                {showEmoji && !recording &&
                  <div className="emoji-panel scroll">{EMOJIS.map((e,i)=><button key={i} type="button" onClick={()=>setDraft(d=>d+e)}>{e}</button>)}</div>}
                {editing && <div className="editbar"><span>✏️ Modification du message</span><button type="button" onClick={()=>{setEditing(null);setDraft("");}}>✕</button></div>}
                <form className={"composer"+(recording?" rec":"")} onSubmit={sendText}>
                  <input type="file" accept="image/*" ref={fileRef} style={{display:"none"}} onChange={onPickImage}/>
                  {recording ? (
                    <><div className="recording"><span className="dot"></span> Enregistrement... {fmtDur(recSec)}</div>
                      <button type="button" className="send stop" onClick={toggleRec}>■</button></>
                  ) : (
                    <>
                      <button type="button" className="attach" onClick={()=>setShowEmoji(v=>!v)} title="Emojis">😊</button>
                      <button type="button" className="attach" disabled={uploading||!!editing} onClick={()=>fileRef.current.click()} title="Photo">📎</button>
                      <button type="button" className="attach" disabled={uploading||!!editing} onClick={toggleRec} title="Note vocale">🎤</button>
                      <input className="txt" value={draft} onChange={e=>setDraft(e.target.value)} onFocus={()=>setShowEmoji(false)}
                        onKeyDown={e=>{if(e.key==="Enter")e.preventDefault();}}
                        placeholder={uploading?"Envoi en cours...":(editing?"Modifier le message...":"Message...")} disabled={uploading} maxLength={2000}/>
                      <button type="button" className="send" disabled={!draft.trim()||uploading} onClick={sendText} aria-label="Envoyer">{editing?"✓":"➤"}</button>
                    </>
                  )}
                </form>
              </>
            ) : (
              <div className="placeholder"><div className="big">🏡</div>{APP_NAME}<br/>Choisis une conversation, ou commence-en une nouvelle.</div>
            )}
          </div>

          {modal && <NewChatModal kind={modal} me={myProfile} users={users} onClose={()=>setModal(null)} onCreate={handleCreate}/>}
          {settings && <SettingsModal profile={myProfile} onClose={()=>setSettings(false)} onZoom={setZoom}/>}
          {members && active && active.type==="group" && <MembersModal conv={active} userMap={userMap} onClose={()=>setMembers(false)} onPick={(uid)=>{setMembers(false);setViewUid(uid);}}/>}
          {viewPerson && <ProfileModal person={viewPerson} isMe={viewUid===user.uid} onClose={()=>setViewUid(null)} onZoom={setZoom}
            onEdit={()=>{setViewUid(null);setSettings(true);}} onMessage={()=>openDirect(viewUid)} onCall={(t)=>startCall(viewUid,t)}/>}
          {zoom && <div className="lightbox" onClick={()=>setZoom(null)}><button className="close">✕</button><img src={zoom} alt="" onClick={e=>e.stopPropagation()}/></div>}

          {incoming && !call &&
            <div className="incoming">
              <Avatar name={incoming.callerName} photo={incoming.photoURL} size={46}/>
              <div className="who"><b>{incoming.callerName}</b><div>{incoming.type==="video"?"Appel vidéo entrant...":"Appel entrant..."}</div></div>
              <button className="dec" onClick={()=>declineCall(incoming)}>📵</button>
              <button className="ans" onClick={()=>acceptCall(incoming)}>📞</button>
            </div>}
          {msgMenu && <div className="overlay" onClick={()=>setMsgMenu(null)}><div className="sheet" onClick={e=>e.stopPropagation()}>
            {msgMenu.type==="text" && <button onClick={()=>startEdit(messages.find(x=>x.id===msgMenu.id)||msgMenu)}>✏️ Modifier le message</button>}
            <button className="danger" onClick={()=>{const id=msgMenu.id;setMsgMenu(null);deleteMsg(id);}}>🗑️ Supprimer pour tous</button>
            <button onClick={()=>setMsgMenu(null)}>Annuler</button>
          </div></div>}

          {call && <CallScreen call={call} localStream={localStream} remoteStream={remoteStream} muted={muted} camOff={camOff}
            onMute={toggleMute} onCam={toggleCam} onHang={endCall}/>}
        </div>
      );
    }

    function App(){
      const [user,setUser]=useState(undefined);
      useEffect(()=>auth.onAuthStateChanged(async u=>{
        if(u){await db.collection("users").doc(u.uid).set({uid:u.uid,email:u.email,displayName:u.displayName||u.email},{merge:true});}
        setUser(u||null);
      }),[]);
      if(user===undefined) return <div className="placeholder" style={{height:"100%",display:"flex",alignItems:"center"}}>Chargement...</div>;
      return user ? <ChatApp user={user}/> : <AuthScreen/>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    function setAppH(){var h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;document.documentElement.style.setProperty("--app-h",h+"px");}
    setAppH();
    window.addEventListener("resize",setAppH);window.addEventListener("orientationchange",setAppH);
    if(window.visualViewport){window.visualViewport.addEventListener("resize",setAppH);window.visualViewport.addEventListener("scroll",setAppH);}
    if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
  </script>
</body>
</html>
