<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bambara's TextBox</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8745a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bambara's TextBox">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@400;600;700;800&display=swap');

    :root{
      --clay:#c8745a;
      --clay-dark:#b15f47;
      --ink:#f0e9df;
      --ink-soft:#b3a596;
      --sand:#231e1a;
      --sand-2:#2e2823;
      --line:rgba(255,255,255,.09);
      --paper:#26211d;
      --green:#5bb27a;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;height:100%;width:100%;overflow:hidden;overscroll-behavior:none;}
    body{
      font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:var(--ink);
      background:#1b1815;
      touch-action:manipulation;
    }
    #root{height:100dvh;height:var(--app-h,100dvh);overflow:hidden;}
    button{font-family:inherit;cursor:pointer;}
    input{font-family:inherit;}
    .scroll{-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

    .auth-wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(160deg,#241f1b,#15110e);
    }
    .auth-card{
      background:var(--paper);
      border-radius:22px;
      box-shadow:0 18px 50px rgba(70,50,35,.18);
      padding:34px 30px;
      width:100%;
      max-width:380px;
      text-align:center;
    }
    .auth-card .logo{font-size:42px;}
    .auth-card h1{
      font-family:'Caveat',cursive;
      font-size:40px;
      color:var(--clay);
      margin:4px 0 2px;
    }
    .auth-card p{color:var(--ink-soft);font-size:14px;margin:0 0 22px;}
    .field{
      display:block;
      width:100%;
      border:2px solid var(--sand-2);
      border-radius:13px;
      padding:13px 15px;
      font-size:16px;
      margin-bottom:12px;
      outline:none;
      background:#1d1916;
      color:var(--ink);
    }
    .field:focus{border-color:var(--clay);}
    .primary{
      width:100%;
      background:var(--clay);
      color:#fff;
      border:none;
      border-radius:13px;
      padding:14px;
      font-size:16px;
      font-weight:800;
    }
    .primary:hover{background:var(--clay-dark);}
    .primary:disabled{opacity:.5;}
    .switch{margin-top:16px;font-size:14px;color:var(--ink-soft);}
    .switch b{color:var(--clay);cursor:pointer;}
    .err{background:#f6dcc9;color:#8a3a22;border-radius:10px;padding:9px 12px;font-size:13.5px;margin-bottom:14px;}

    .app{
      display:flex;
      height:100%;
      max-width:1024px;
      margin:0 auto;
      background:var(--paper);
      box-shadow:0 0 60px rgba(70,50,35,.15);
    }
    .sidebar{
      width:340px;
      border-right:1px solid var(--line);
      display:flex;
      flex-direction:column;
      background:var(--paper);
    }
    .side-head{
      padding:calc(13px + env(safe-area-inset-top)) 14px 13px;
      display:flex;
      align-items:center;
      gap:10px;
      background:var(--clay);
      color:#fff;
    }
    .side-id{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0;}
    .side-head .me{font-weight:800;font-size:15px;line-height:1.15;min-width:0;}
    .side-head .me small{font-weight:600;opacity:.85;font-size:12px;}
    .icon-btn{
      background:rgba(255,255,255,.18);
      border:none;
      color:#fff;
      width:36px;
      height:36px;
      border-radius:50%;
      font-size:16px;
      flex-shrink:0;
    }
    .icon-btn:hover{background:rgba(255,255,255,.3);}
    .head-actions{margin-left:auto;display:flex;gap:7px;}
    .searchbar{padding:9px 12px;border-bottom:1px solid var(--line);background:var(--sand);}
    .searchbar input{
      width:100%;
      border:none;
      border-radius:20px;
      padding:9px 15px;
      font-size:14.5px;
      background:var(--paper);
      color:var(--ink);
      outline:none;
    }
    .new-row{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);}
    .new-row button{
      flex:1;
      background:var(--sand);
      border:1px solid var(--line);
      border-radius:11px;
      padding:9px;
      font-weight:700;
      font-size:13.5px;
      color:var(--ink);
    }
    .new-row button:hover{border-color:var(--clay);color:var(--clay);}
    .conv-list{flex:1;overflow-y:auto;}
    .conv{
      display:flex;
      gap:12px;
      align-items:center;
      padding:12px 14px;
      cursor:pointer;
      border-bottom:1px solid var(--line);
    }
    .conv:hover{background:var(--sand);}
    .conv.active{background:var(--sand-2);}
    .conv .meta{min-width:0;flex:1;}
    .conv .name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv .last{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv .tag{font-size:10px;background:rgba(79,157,106,.18);color:var(--green);font-weight:800;padding:1px 7px;border-radius:10px;margin-left:6px;}
    .unread{width:11px;height:11px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .empty-side{padding:30px 20px;text-align:center;color:var(--ink-soft);font-size:14px;}

    .avatar{
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:800;
      flex-shrink:0;
      overflow:hidden;
      object-fit:cover;
    }

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      position:relative;
      background-color:#1b1815;
    }
    .main-head{
      display:flex;
      align-items:center;
      gap:11px;
      padding:calc(11px + env(safe-area-inset-top)) 14px 11px;
      border-bottom:1px solid var(--line);
      background:var(--clay);
      color:#fff;
    }
    .main-head .hid{display:flex;align-items:center;gap:11px;cursor:pointer;min-width:0;flex:1;}
    .main-head .title{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .main-head .subtitle{font-size:12px;opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .call-btns{display:flex;gap:7px;}
    .call-btns button{
      background:rgba(255,255,255,.18);
      border:none;
      color:#fff;
      border-radius:50%;
      width:40px;
      height:40px;
      font-size:16px;
    }
    .call-btns button:hover{background:rgba(255,255,255,.3);}
    .back-btn{display:none;background:none;border:none;font-size:24px;color:#fff;padding:0 2px 0 0;}

    .messages{
      flex:1;
      overflow-y:auto;
      padding:16px 14px;
      display:flex;
      flex-direction:column;
      gap:3px;
      background-color:#1b1815;
    }
    .daysep{
      align-self:center;
      background:rgba(0,0,0,.4);
      color:#e9ddc9;
      font-size:11.5px;
      font-weight:800;
      padding:4px 14px;
      border-radius:14px;
      margin:10px 0 6px;
    }
    .row{display:flex;gap:8px;align-items:flex-end;max-width:80%;margin-top:2px;}
    .row.mine{align-self:flex-end;flex-direction:row-reverse;}
    .row.theirs{align-self:flex-start;}
    .row .avatar{cursor:pointer;}
    .bubble{
      padding:8px 12px 6px;
      border-radius:14px;
      font-size:15.5px;
      line-height:1.4;
      box-shadow:0 1px 2px rgba(70,50,35,.16);
      word-break:break-word;
      position:relative;
    }
    .bubble.theirs{background:#2b2521;color:var(--ink);border-top-left-radius:4px;}
    .bubble.mine{background:var(--clay);color:#fff;border-top-right-radius:4px;}
    .bubble.mine .meta-line{color:rgba(255,255,255,.85);}
    .bubble.media{padding:4px;}
    .sender{font-size:12px;font-weight:800;margin-bottom:2px;}
    .msg-img{max-width:230px;max-height:300px;border-radius:11px;display:block;cursor:pointer;}
    .msg-audio{width:230px;height:40px;display:block;}
    .meta-line{display:flex;align-items:center;justify-content:flex-end;gap:4px;font-size:10px;color:var(--ink-soft);margin-top:2px;}
    .tick{font-weight:800;}
    .tick.read{color:#2f9bd1;}

    .callmsg{
      align-self:center;
      display:flex;
      align-items:center;
      gap:8px;
      background:rgba(0,0,0,.4);
      color:#e9ddc9;
      font-size:13px;
      font-weight:700;
      padding:7px 14px;
      border-radius:14px;
      margin:6px 0;
    }
    .callmsg .t{opacity:.55;font-size:10px;}

    .composer{
      display:flex;
      gap:6px;
      align-items:center;
      padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line);
      background:var(--sand);
      width:100%;
      min-width:0;
    }
    .composer input.txt{
      flex:1 1 auto;
      min-width:0;
      width:auto;
      border:none;
      border-radius:22px;
      padding:12px 14px;
      font-size:16px;
      background:var(--paper);
      color:var(--ink);
      outline:none;
    }
    .attach{
      background:var(--paper);
      color:var(--ink);
      border:1px solid var(--line);
      border-radius:50%;
      width:38px;
      height:38px;
      flex:0 0 38px;
      font-size:17px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .send{
      background:var(--clay);
      color:#fff;
      border:none;
      border-radius:50%;
      width:42px;
      height:42px;
      flex:0 0 42px;
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .send:hover{background:var(--clay-dark);}
    .send:disabled,.attach:disabled{opacity:.4;}
    .send.stop{background:#c0392b;}
    .recording{flex:1;display:flex;align-items:center;gap:9px;color:#e0664f;font-weight:700;font-size:15px;padding-left:6px;}
    .dot{width:11px;height:11px;border-radius:50%;background:#c0392b;animation:blink 1s infinite;}
    @keyframes blink{50%{opacity:.25;}}
    .placeholder{margin:auto;text-align:center;color:var(--ink-soft);padding:30px;}
    .placeholder .big{font-size:46px;margin-bottom:8px;}

    .emoji-panel{
      position:absolute;
      bottom:64px;
      left:12px;
      right:12px;
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 8px 30px rgba(60,40,25,.25);
      padding:8px;
      max-height:210px;
      overflow-y:auto;
      display:grid;
      grid-template-columns:repeat(8,1fr);
      gap:2px;
      z-index:20;
    }
    .emoji-panel button{background:none;border:none;font-size:23px;padding:5px;border-radius:8px;line-height:1;}
    .emoji-panel button:hover{background:var(--sand);}

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(46,41,38,.5);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }
    .modal{
      background:var(--paper);
      border-radius:18px;
      width:100%;
      max-width:390px;
      padding:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.3);
      max-height:88vh;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
    }
    .modal h2{margin:0 0 14px;font-size:19px;}
    .modal h3{margin:8px 0 8px;font-size:12.5px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
    .user-pick{overflow-y:auto;margin-bottom:14px;}
    .user-row{display:flex;gap:11px;align-items:center;padding:9px 8px;border-radius:11px;cursor:pointer;}
    .user-row:hover{background:var(--sand);}
    .user-row .nm{font-weight:700;font-size:15px;}
    .user-row .em{font-size:12px;color:var(--ink-soft);}
    .check{margin-left:auto;font-size:18px;color:var(--clay);width:22px;text-align:center;}
    .modal-actions{display:flex;gap:10px;}
    .modal-actions button{flex:1;border-radius:12px;padding:12px;font-weight:800;border:none;font-size:15px;}
    .ghost{background:var(--sand-2);color:var(--ink);}
    .link-btn{background:var(--sand-2);border:none;border-radius:11px;padding:10px 14px;font-weight:700;color:var(--ink);}
    .photo-block{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
    .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
    .chip{background:var(--sand-2);border:1px solid var(--line);border-radius:16px;padding:7px 13px;font-size:13.5px;font-weight:700;color:var(--ink);}
    .swatch-row{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px;}
    .swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;}
    .swatch.sel{border-color:var(--ink);}
    .prof{display:flex;flex-direction:column;align-items:center;text-align:center;}
    .prof .big-av{cursor:zoom-in;margin-bottom:14px;}
    .prof .pname{font-size:22px;font-weight:800;}
    .prof .pmail{font-size:13px;color:var(--ink-soft);margin-top:2px;}
    .prof .pabout{margin-top:8px;background:var(--sand);border-radius:12px;padding:12px 14px;font-size:15px;width:100%;}
    .prof .palabel{font-size:11px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.04em;text-align:left;margin-top:14px;width:100%;}
    .sheet{background:var(--paper);border-radius:16px;width:100%;max-width:320px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.45);}
    .sheet button{display:block;width:100%;text-align:left;padding:15px 18px;background:none;border:none;border-bottom:1px solid var(--line);font-size:16px;color:var(--ink);font-weight:700;}
    .sheet button:last-child{border-bottom:none;}
    .sheet button.danger{color:#e0664f;}
    .editbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--sand-2);border-top:1px solid var(--line);font-size:13.5px;color:var(--ink-soft);font-weight:700;}
    .editbar button{margin-left:auto;background:none;border:none;color:var(--clay);font-size:18px;}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px;}
    .lightbox img{max-width:94vw;max-height:88vh;border-radius:14px;}
    .lightbox .close{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;background:none;border:none;}

    .incoming{
      position:fixed;
      top:0;
      left:0;
      right:0;
      background:var(--clay);
      color:#fff;
      z-index:80;
      padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
      display:flex;
      align-items:center;
      gap:13px;
      box-shadow:0 6px 24px rgba(0,0,0,.3);
      animation:slidein .25s ease;
    }
    @keyframes slidein{from{transform:translateY(-100%);}to{transform:none;}}
    .incoming .who{flex:1;min-width:0;}
    .incoming .who b{font-size:16px;}
    .incoming .who div{font-size:12.5px;opacity:.9;}
    .incoming .ans{background:#3a9d63;border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:20px;}
    .incoming .dec{background:#c0392b;border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:20px;}

    .call-screen{position:fixed;inset:0;background:#1d1916;color:#fff;z-index:85;display:flex;flex-direction:column;align-items:center;}
    .call-video-remote{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
    .call-video-local{position:absolute;top:16px;right:16px;width:108px;height:150px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,255,255,.5);background:#000;z-index:2;}
    .call-info{position:relative;z-index:2;margin-top:14vh;display:flex;flex-direction:column;align-items:center;text-shadow:0 1px 6px rgba(0,0,0,.5);}
    .call-info .cname{font-size:26px;font-weight:800;margin-top:14px;}
    .call-info .cstate{opacity:.85;margin-top:5px;font-size:15px;}
    .call-controls{position:relative;z-index:3;margin-top:auto;margin-bottom:8vh;display:flex;gap:18px;}
    .call-controls button{width:62px;height:62px;border-radius:50%;border:none;font-size:24px;color:#fff;background:rgba(255,255,255,.18);}
    .call-controls .hang{background:#c0392b;}
    .call-controls .on{background:#fff;color:#111;}

    @media (max-width:760px){
      .app{max-width:none;}
      .sidebar{width:100%;}
      .app.has-active .sidebar{display:none;}
      .app:not(.has-active) .main{display:none;}
      .back-btn{display:block;}
    }

    @media (max-width:420px){
      .composer{gap:5px;padding-left:6px;padding-right:6px;}
      .attach{width:34px;height:34px;flex-basis:34px;font-size:15px;}
      .send{width:38px;height:38px;flex-basis:38px;font-size:16px;}
      .composer input.txt{padding:10px 12px;font-size:15px;}
      .row{max-width:88%;}
      .msg-audio{width:210px;}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const firebaseConfig = {
      apiKey: "AIzaSyCD_pSdJA9ZZUREiu7_gdLG1_MHz1IfIAc",
      authDomain: "bambara-s-textbox.firebaseapp.com",
      projectId: "bambara-s-textbox",
      storageBucket: "bambara-s-textbox.firebasestorage.app",
      messagingSenderId: "47764558242",
      appId: "1:47764558242:web:e13d483b8dc353f153a2fb"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();
    const TS = firebase.firestore.FieldValue.serverTimestamp;

    const ICE = {
      iceServers:[
        {urls:"stun:stun.l.google.com:19302"},
        {urls:"stun:stun1.l.google.com:19302"}
      ]
    };

    const {useState,useEffect,useRef} = React;

    const APP_NAME = "Bambara's TextBox";
    const THEME_COLORS = ["#c8745a","#b1492f","#d4956b","#c9a24b","#5e8b6e","#3f7d6e","#7a9e9f","#6e7fa8","#4a5d8a","#8e7cc3","#a8607e","#2e2926"];
    const ABOUT_PRESETS = ["Disponible","Occupé","À l'école","Au travail","En réunion","Ne pas déranger","En vacances","Batterie faible"];
    const EMOJIS = ("😀 😃 😄 😁 😆 😅 😂 🤣 😊 😇 🙂 🙃 😉 😌 😍 🥰 😘 😗 😋 😛 😜 🤪 😎 🥳 "+
      "😏 😴 😪 😔 😟 🙁 😣 😫 😩 🥺 😢 😭 😤 😠 😡 🤯 😳 🥵 🥶 😱 😨 🤗 🤔 🤭 🙄 😬 "+
      "👍 👎 👌 ✌️ 🤞 🤟 👏 🙌 🙏 🤝 💪 👋 👆 👇 👉 👈 ✋ "+
      "❤️ 🧡 💛 💚 💙 💜 🖤 🤍 💔 💕 💞 💖 💘 ✨ ⭐ 🌟 🔥 💯 ✅ ❌ "+
      "🎉 🎊 🎈 🎁 🌈 ☀️ 🌙 ⛄ 🌸 🌹 🌻 🍀 🎵 🎶 ☕ 🍷 🍺 🥂 🍰 🎂 🍫 🍓 🍕 🍔 "+
      "🐶 🐱 🐭 🐰 🦊 🐻 🐼 🐨 🦁 🐮 🐷 🐸 🐵 🐔 🦄 🐝 🦋").trim().split(/\s+/);

    function colorFor(s){
      let h=0;
      s=s||"?";
      for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
      return THEME_COLORS[h%THEME_COLORS.length];
    }

    function initials(n){
      if(!n)return"?";
      const p=n.trim().split(/\s+/);
      return (p.length===1?p[0][0]:p[0][0]+p[p.length-1][0]).toUpperCase();
    }

    function fmtTime(ts){
      if(!ts)return"";
      const d=ts.toDate?ts.toDate():new Date(ts);
      return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    }

    function fmtDay(ts){
      if(!ts)return"";
      const d=ts.toDate?ts.toDate():new Date(ts);
      const t=new Date();
      const y=new Date();
      y.setDate(t.getDate()-1);
      if(d.toDateString()===t.toDateString())return"Aujourd'hui";
      if(d.toDateString()===y.toDateString())return"Hier";
      return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
    }

    function ms(ts){
      return ts&&ts.toMillis?ts.toMillis():0;
    }

    function fmtDur(s){
      return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
    }

    function directId(a,b){
      return [a,b].sort().join("__");
    }

    function darken(hex,amt){
      amt=amt||0.16;
      const h=(hex||"").replace("#","");
      if(h.length!==6)return hex;
      let r=parseInt(h.slice(0,2),16);
      let g=parseInt(h.slice(2,4),16);
      let b=parseInt(h.slice(4,6),16);
      r=Math.round(r*(1-amt));
      g=Math.round(g*(1-amt));
      b=Math.round(b*(1-amt));
      return "#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join("");
    }

    function readAsDataURL(file){
      return new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
    }

    async function compressImage(file,maxDim){
      maxDim=maxDim||1024;
      const src=await readAsDataURL(file);
      const img=await new Promise((res,rej)=>{
        const i=new Image();
        i.onload=()=>res(i);
        i.onerror=rej;
        i.src=src;
      });

      let w=img.width,h=img.height;
      if(w>h && w>maxDim){
        h=Math.round(h*maxDim/w);
        w=maxDim;
      }else if(h>=w && h>maxDim){
        w=Math.round(w*maxDim/h);
        h=maxDim;
      }

      const c=document.createElement("canvas");
      c.width=w;
      c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);

      let q=0.8;
      let out=c.toDataURL("image/jpeg",q);
      while(out.length>900000 && q>0.3){
        q-=0.12;
        out=c.toDataURL("image/jpeg",q);
      }
      return out;
    }

    function notify(title,body){
      if(!("Notification" in window) || Notification.permission!=="granted")return;
      try{
        if(navigator.serviceWorker && navigator.serviceWorker.ready){
          navigator.serviceWorker.ready.then(r=>{
            r.showNotification(title,{body,icon:"icon-192.png",badge:"icon-192.png",tag:title});
          }).catch(()=>{
            try{new Notification(title,{body,icon:"icon-192.png"});}catch(e){}
          });
        }else{
          new Notification(title,{body,icon:"icon-192.png"});
        }
      }catch(e){}
    }

      const [pw,setPw]=useState("");
      const [err,setErr]=useState("");
      const [busy,setBusy]=useState(false);

      async function submit(e){
        e.preventDefault();
        setErr("");
        setBusy(true);

        try{
          if(mode==="register"){
            if(name.trim().length<2){
              setErr("Indique ton prénom.");
              setBusy(false);
              return;
            }

            const cred=await auth.createUserWithEmailAndPassword(email.trim(),pw);
            await cred.user.updateProfile({displayName:name.trim()});
            await db.collection("users").doc(cred.user.uid).set({
              uid:cred.user.uid,
              email:email.trim(),
              displayName:name.trim(),
              about:"",
              createdAt:TS()
            });
          }else{
            await auth.signInWithEmailAndPassword(email.trim(),pw);
          }
        }catch(ex){
          const m={
            "auth/invalid-email":"Adresse e-mail invalide.",
            "auth/email-already-in-use":"Cette adresse est déjà inscrite.",
            "auth/weak-password":"Mot de passe trop court, 6 caractères minimum.",
            "auth/invalid-credential":"E-mail ou mot de passe incorrect.",
            "auth/wrong-password":"Mot de passe incorrect.",
            "auth/user-not-found":"Aucun compte avec cette adresse."
          }[ex.code]||ex.message;
          setErr(m);
        }

        setBusy(false);
      }

      return (
        <div className="auth-wrap">
          <div className="auth-card">
            <div className="logo">🏡</div>
            <h1>{APP_NAME}</h1>
            <p>{mode==="register"?"Crée ton compte pour rejoindre la famille.":"Connecte-toi pour retrouver tes conversations."}</p>

            {err && <div className="err">{err}</div>}

            <form onSubmit={submit}>
              {mode==="register" && <input className="field" placeholder="Ton prénom" value={name} onChange={e=>setName(e.target.value)}/>}
              <input className="field" type="email" placeholder="Adresse e-mail" value={email} onChange={e=>setEmail(e.target.value)}/>
              <input className="field" type="password" placeholder="Mot de passe" value={pw} onChange={e=>setPw(e.target.value)}/>
              <button className="primary" disabled={busy}>{busy?"...":mode==="register"?"Créer mon compte":"Se connecter"}</button>
            </form>

            <div className="switch">
              {mode==="register"
                ? <>Déjà un compte ? <b onClick={()=>{setMode("login");setErr("");}}>Se connecter</b></>
                : <>Pas encore de compte ? <b onClick={()=>{setMode("register");setErr("");}}>S'inscrire</b></>}
            </div>
          </div>
        </div>
      );
    }
